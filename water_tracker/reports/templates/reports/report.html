{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Leak - Water Tracker</title>
    <style>
        body {
            background-color: #e0f2fe; /* Light Blue */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #334155;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
        }

        .back-link {
            text-decoration: none;
            color: #2563eb;
            font-size: 0.9rem;
            display: inline-block;
            margin-bottom: 15px;
        }

        h2 {
            margin-top: 0;
            color: #0369a1;
            border-bottom: 2px solid #e0f2fe;
            padding-bottom: 10px;
        }

        .section {
            margin-bottom: 20px;
        }

        .section-title {
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            color: #475569;
        }

        /* Styling for your custom icons */
        .section-icon {
            height: 24px;
            width: 24px;
            object-fit: contain;
        }

        input[type="text"], 
        input[type="tel"], 
        select, 
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }

        .location-group {
            display: flex;
            gap: 10px;
        }

        .btn-location {
            white-space: nowrap;
            background-color: #f1f5f9;
            border: 1px solid #cbd5e1;
            padding: 0 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }

        .btn-submit {
            width: 100%;
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 14px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }

        .btn-submit:hover {
            background-color: #1d4ed8;
        }

        .file-input-wrapper {
            margin-top: 5px;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="container">
    <a href="/" class="back-link">← Back to Home</a>
    <h2>Report Leak</h2>

    <form method="POST" action="{% url 'report' %}" enctype="multipart/form-data">
        {% csrf_token %}
        
        <div class="section">
            <div class="section-title">
                <img src="{% static 'images/location.png' %}" class="section-icon" alt="Location Icon">
                Location
            </div>
            <div class="location-group">
                <input type="text" name="location" placeholder="Current GPS Address" required>
                <button type="button" class="btn-location">📍 Use My Location</button>
            </div>
        </div>

        <div class="section">
            <div class="section-title">
                <img src="{% static 'images/details.png' %}" class="section-icon" alt="Details Icon">
                Details
            </div>
            
            <input type="text" name="full_name" placeholder="Full Name" required>
            <input type="tel" name="phone" placeholder="Cellphone Number" required style="margin-top: 10px;">
            
            <select name="leak_type" style="margin-top: 10px;">
                <option value="">-- Select Leak Type --</option>
                <option value="trickle">Trickle (Low Flow)</option>
                <option value="steady">Steady Stream</option>
                <option value="burst">Burst Pipe (High Flow)</option>
            </select>

            <textarea name="details" rows="3" placeholder="Add more details..." style="margin-top: 10px;"></textarea>
        </div>

        <div class="section">
            <div class="section-title">📸 Evidence</div>
            <div class="file-input-wrapper">
                <input type="file" name="evidence" id="file-upload">
            </div>
        </div>

        <button type="submit" class="btn-submit">SUBMIT REPORT</button>
    </form>
</div>

</body>
</html>
